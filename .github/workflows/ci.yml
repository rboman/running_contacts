name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run test suite
        run: pytest -q

  gui-smoke:
    name: GUI smoke (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux Qt dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0

      - name: Install project and GUI test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[gui] pytest

      - name: Run GUI smoke tests
        run: pytest -q tests/test_gui_app.py tests/test_gui.py
