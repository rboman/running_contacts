name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run test suite
        run: pytest -q

  gui-smoke:
    name: GUI smoke
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: xcb

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libfontconfig1 \
            libglib2.0-0 \
            libnss3 \
            libopengl0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxi6 \
            libxkbcommon-x11-0 \
            libxrender1 \
            libxtst6 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            xvfb

      - name: Install project and GUI test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[gui] pytest

      - name: Run GUI smoke tests
        run: xvfb-run -a pytest -q tests/test_gui_app.py tests/test_gui.py
